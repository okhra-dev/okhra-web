<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okhra V2</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
    :root {
        --bg: #ffffff;
        --fg: #000000;
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-400: #a3a3a3;
        --gray-600: #525252;
        --gray-900: #171717;
        --accent: #000000;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background-color: var(--bg);
        color: var(--fg);
        line-height: 1.5;
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Navigation */
    .top-nav {
        display: flex;
        gap: 2rem;
        margin-bottom: 3rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--fg);
    }
    
    .top-nav a {
        text-decoration: none;
        color: var(--gray-600);
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: color 0.15s;
    }
    
    .top-nav a:hover {
        color: var(--fg);
    }
    
    .top-nav a.active {
        color: var(--fg);
        font-weight: 600;
    }

    h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
    }
    
    p.subtitle {
        font-size: 0.875rem;
        color: var(--gray-600);
        margin-bottom: 3rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        width: 100%;
    }
    
    @media (max-width: 768px) {
        .container {
            grid-template-columns: 1fr;
        }
    }

    .panel {
        background-color: var(--gray-100);
        border: 1px solid var(--fg);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        height: 600px;
    }

    textarea {
        width: 100%;
        flex-grow: 1;
        background-color: var(--bg);
        border: 1px solid var(--gray-400);
        color: var(--fg);
        font-family: inherit;
        font-size: 0.875rem;
        padding: 1rem;
        resize: none;
        outline: none;
        line-height: 1.6;
    }
    
    textarea:focus {
        border-color: var(--fg);
    }

    button {
        background-color: var(--fg);
        color: var(--bg);
        border: 1px solid var(--fg);
        padding: 0.75rem 1.5rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.15s;
    }
    
    button:hover:not(:disabled) {
        background-color: var(--bg);
        color: var(--fg);
    }
    
    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: var(--gray-200);
        color: var(--gray-600);
        border-color: var(--gray-400);
    }

    #verdictBox {
        text-align: left;
        padding: 1rem;
        font-size: 0.875rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background-color: var(--bg);
        border: 1px solid var(--fg);
        margin-bottom: 1rem;
        flex-shrink: 0;
        min-height: 3rem;
        display: flex;
        align-items: center;
    }

    #coloredText {
        flex-grow: 1;
        background-color: var(--bg);
        border: 1px solid var(--gray-400);
        padding: 1rem;
        font-size: 0.875rem;
        white-space: pre-wrap;
        overflow-y: auto;
        line-height: 1.6;
        color: var(--gray-900);
    }

    .chunk-ai {
        background-color: var(--fg);
        color: var(--bg);
        padding: 0.1em 0;
    }
    
    .chunk-mixed {
        background-color: var(--gray-400);
        color: var(--fg);
        padding: 0.1em 0;
    }
</style>
</head>
<body>

<nav class="top-nav">
    <a href="https://okhra.neocities.org">About</a>
    <a href="https://okhra-dev.github.io/okhra-web" class="active">AI detector</a>
    <a href="https://okhra.neocities.org/research">Research</a>
    <a href="https://okhra.neocities.org/contact">Contact</a>
</nav>

<h1>Okhra V2</h1>
<p class="subtitle">Fast and accurate AI detector. All text is processed locally in your browser. English language only.</p>

<div class="container">
    <div class="panel">
        <textarea id="inputText" placeholder="Paste text here to analyze..."></textarea>
        <button id="checkBtn" disabled>Loading Model...</button>
    </div>
    <div class="panel right-panel">
        <div id="verdictBox">Waiting for input...</div>
        <div id="coloredText">Output will appear here. AI-generated segments will be highlighted.</div>
    </div>
</div>

<script>
    let session = null;
    let config = null;
    let selectWordsSet = null;
    let punctRegex = null;

    const punctStr = "!\"#$%&()*+,-./:;<=>?@[\\]^_`{|}~–—…«»‹›„‚‐‑‒―‟‛";

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, function(m) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m];
        });
    }

    async function init() {
        try {
            const configRes = await fetch('model_config.json');
            config = await configRes.json();
            selectWordsSet = new Set(config.select_words);

            const escapedPunct = punctStr.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
            punctRegex = new RegExp(`([${escapedPunct}])`, 'g');

            session = await ort.InferenceSession.create('okhra_v2.onnx', { executionProviders: ['wasm'] });

            document.getElementById('checkBtn').innerText = "Check Text";
            document.getElementById('checkBtn').disabled = false;
        } catch (e) {
            console.error(e);
            document.getElementById('checkBtn').innerText = "Error loading model";
            document.getElementById('verdictBox').innerText = "Check browser console for errors.";
        }
    }

    function sigmoid(z) {
        return 1 / (1 + Math.exp(-z));
    }

    async function analyzeText() {
        if (!session || !config) return;
        const text = document.getElementById('inputText').value;
        if (text.trim().length === 0) return;

        const wordCount = (text.match(/\S+/g) || []).length;
        if (wordCount < 50) {
            let verdictEl = document.getElementById('verdictBox');
            verdictEl.innerText = "Text too short — minimum 50 words required";
            verdictEl.style.color = "var(--gray-600)";
            document.getElementById('coloredText').innerText = "";
            return;
        }

        document.getElementById('checkBtn').innerText = "Analyzing...";
        document.getElementById('checkBtn').disabled = true;

        try {
            let tokens = [];
            let wordRegex = /\S+/g;
            let match;

            while ((match = wordRegex.exec(text)) !== null) {
                let word = match[0];
                let startIdx = match.index;
                let endIdx = wordRegex.lastIndex;

                let paddedWord = word.toLowerCase().replace(punctRegex, ' $1 ');
                let subTokens = paddedWord.trim().split(/\s+/);

                for (let t of subTokens) {
                    if (t === "") continue;
                    let isPunct = punctStr.includes(t) && t.length === 1;
                    let mappedT = (isPunct || selectWordsSet.has(t)) ? t : '_';
                    let id = config.vocab_map[mappedT] || config.unk_idx;
                    tokens.push({ id: id, start: startIdx, end: endIdx });
                }
            }

            if (tokens.length === 0) {
                resetUI();
                return;
            }

            let maxLen = config.max_len;
            let numChunks = Math.ceil(tokens.length / maxLen);
            let flatArray = new BigInt64Array(numChunks * maxLen);
            flatArray.fill(BigInt(config.pad_idx));

            for (let c = 0; c < numChunks; c++) {
                let chunkStart = c * maxLen;
                let chunkEnd = Math.min(tokens.length, (c + 1) * maxLen);
                for (let i = 0; i < (chunkEnd - chunkStart); i++) {
                    flatArray[c * maxLen + i] = BigInt(tokens[chunkStart + i].id);
                }
            }

            const inputTensor = new ort.Tensor('int64', flatArray, [numChunks, maxLen]);
            const results = await session.run({ input: inputTensor });
            const logits = results.output.data;
            
            let probs = [];
            let totalProb = 0;
            let hasHighProbChunk = false;

            for (let i = 0; i < numChunks; i++) {
                let p = sigmoid(logits[i]);
                probs.push(p);
                totalProb += p;
                if (p > 0.7) hasHighProbChunk = true; 
            }
            let avgProb = totalProb / numChunks;
            let threshold = config.threshold;
            
            let verdictEl = document.getElementById('verdictBox');
            
            if (avgProb > threshold) {
                verdictEl.innerText = `AI Generated (${(avgProb * 100).toFixed(1)}% confidence)`;
                verdictEl.style.color = "var(--fg)";
            } else if (hasHighProbChunk) {
                verdictEl.innerText = `Mixed Content`;
                verdictEl.style.color = "var(--gray-600)";
            } else {
                verdictEl.innerText = `Human Written (${(100 - avgProb * 100).toFixed(1)}% confidence)`;
                verdictEl.style.color = "var(--gray-600)";
            }

            let renderedHtml = "";
            let lastIdx = 0;

            for (let c = 0; c < numChunks; c++) {
                let startTokenIdx = c * maxLen;
                let nextStartTokenIdx = (c + 1) * maxLen;

                let chunkStartChar = tokens[startTokenIdx].start;
                let chunkEndChar = (nextStartTokenIdx < tokens.length) ? tokens[nextStartTokenIdx].start : text.length;

                if (chunkStartChar > lastIdx) {
                    renderedHtml += escapeHTML(text.substring(lastIdx, chunkStartChar));
                }

                let chunkText = text.substring(chunkStartChar, chunkEndChar);
                let prob = probs[c];

                if (prob > threshold) {
                    renderedHtml += `<span class="chunk-ai">${escapeHTML(chunkText)}</span>`;
                } else if (prob > 0.5) {
                    renderedHtml += `<span class="chunk-mixed">${escapeHTML(chunkText)}</span>`;
                } else {
                    renderedHtml += `<span>${escapeHTML(chunkText)}</span>`;
                }
                lastIdx = chunkEndChar;
            }
            
            if (lastIdx < text.length) {
                renderedHtml += escapeHTML(text.substring(lastIdx));
            }

            document.getElementById('coloredText').innerHTML = renderedHtml;

        } catch (err) {
            console.error(err);
            document.getElementById('verdictBox').innerText = "Analysis error occurred";
        }

        document.getElementById('checkBtn').innerText = "Check Text";
        document.getElementById('checkBtn').disabled = false;
    }

    function resetUI() {
        document.getElementById('checkBtn').innerText = "Check Text";
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('verdictBox').innerText = "Waiting for input...";
        document.getElementById('verdictBox').style.color = "inherit";
        document.getElementById('coloredText').innerHTML = "Output will appear here with AI-generated text highlighted";
    }

    document.getElementById('checkBtn').addEventListener('click', analyzeText);

    window.onload = init;
</script>
</body>
</html>
